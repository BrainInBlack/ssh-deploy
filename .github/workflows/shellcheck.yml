name: shellcheck

# Runs on GitHub Actions.
on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo to lint it.
permissions:
  contents: read
  pull-requests: write

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ensure shellcheck is available
        run: command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y shellcheck; }
      - name: Lint
        run: |
          bash -n ssh-deploy
          shellcheck ssh-deploy
