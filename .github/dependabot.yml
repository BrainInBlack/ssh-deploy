version: 2
updates:
  # Keep the GitHub Actions in our workflows current (this is what would have
  # caught the actions/checkout Node-20 deprecation).
  - package-ecosystem: github-actions
    directory: "/"
    # Bumps flow through the develop integration branch, not straight to main.
    target-branch: "develop"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
